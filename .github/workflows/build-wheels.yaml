name: Build PyVerse Wheels

on:
  push:
    branches: [main]
  pull_request:

jobs:
  build-wheels:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install cibuildwheel

      - name: Build wheels
        run: |
          cibuildwheel --output-dir wheelhouse

      - name: List wheels
        run: ls wheelhouse || dir wheelhouse

      - name: Upload wheels
        uses: actions/upload-artifact@v4
        with:
          name: pyverse-wheels
          path: wheelhouse/*.whl